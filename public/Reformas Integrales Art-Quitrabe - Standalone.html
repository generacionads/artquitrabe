document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

av\n    const navBg = navScrolled ? 'rgba(244,241,235,0.97)' : 'transparent';\n    const navBorderBottom = navScrolled ? '1px solid rgba(20,19,22,0.08)' : '1px solid transparent';\n    const navBoxShadow = navScrolled ? '0 1px 24px rgba(0,0,0,0.07)' : 'none';\n    const navTextColor = navScrolled ? '#141316' : '#FDFAF5';\n    const navLogoFilter = navScrolled ? 'none' : 'brightness(0) invert(1)';\n\n    // FAQ data\n    const faqViviendaRaw = [\n      { id: 'v1', q: '¿Cuánto cuesta una reforma integral de vivienda en Madrid?', a: 'El coste varía según el tamaño, calidad de materiales y complejidad. Como referencia, una reforma integral puede oscilar entre 600€ y 1.200€ por metro cuadrado. Te ofrecemos un presupuesto personalizado gratuito tras la visita inicial.' },\n      { id: 'v2', q: '¿Cuánto tiempo dura una reforma de vivienda?', a: 'Una reforma integral de 80-100 m² suele durar entre 2 y 4 meses. El plazo exacto se establece en el contrato según las características del proyecto. Nos comprometemos a cumplir los plazos acordados.' },\n      { id: 'v3', q: '¿Puedo vivir en la vivienda durante la reforma?', a: 'Generalmente no es recomendable durante una reforma integral. Sin embargo, en reformas parciales podemos planificar la obra por fases para minimizar molestias y permitirte seguir en el inmueble.' },\n      { id: 'v4', q: '¿Necesito licencia para reformar mi vivienda?', a: 'Depende del alcance. Las obras menores requieren comunicación previa; las mayores, licencia de obras. Nos encargamos de toda la gestión de permisos con el Ayuntamiento de Madrid, incluido en nuestro servicio.' },\n      { id: 'v5', q: '¿Qué diferencia a Art-Quitrabe de otras empresas?', a: 'Somos especialistas en arquitectura de interiores, no solo ejecutamos obras. Combinamos diseño propio con calidad constructiva. Presupuesto cerrado, plazos garantizados y trato personalizado.' },\n    ];\n\n    const faqLocalesRaw = [\n      { id: 'l1', q: '¿Os encargáis de la gestión de licencias y permisos?', a: 'Sí. Redactamos el proyecto técnico, tramitamos la licencia de obras y gestionamos la licencia de actividad o apertura ante el Ayuntamiento. Servicio llave en mano completo.' },\n      { id: 'l2', q: '¿Hay garantía sobre la obra realizada?', a: 'Sí. Todas nuestras intervenciones cuentan con garantía legal de construcción y un servicio post-venta para resolver cualquier ajuste durante los primeros meses de funcionamiento.' },\n      { id: 'l3', q: '¿Es posible realizar la obra por fases para no cerrar el negocio?', a: 'En locales operativos planificamos turnos especiales (nocturnos o en fin de semana) para minimizar el impacto en tu actividad comercial y que no pierdas ni un día de facturación.' },\n      { id: 'l4', q: '¿Cómo aseguráis que el local cumpla la normativa de accesibilidad?', a: 'Diseñamos eliminando barreras desde el inicio: rampas con la pendiente reglamentaria, anchos de pasillo específicos y adaptación de aseos para personas con movilidad reducida (PMR).' },\n      { id: 'l5', q: '¿Cuánto tiempo tarda la reforma de un local comercial?', a: 'Un local de 100-150 m² puede reformarse en 6-12 semanas. Si requiere licencia de actividad, los plazos administrativos pueden extenderse según el Ayuntamiento, aunque gestionamos todo el proceso.' },\n    ];\n\n    const activeFaqs = (faqTab === 'vivienda' ? faqViviendaRaw : faqLocalesRaw)\n      .map(f => ({ ...f, isOpen: openFaq === f.id, indicator: openFaq === f.id ? '−' : '+' }));\n\n    const faqTabViviendaBg = faqTab === 'vivienda' ? '#141316' : 'transparent';\n    const faqTabViviendaColor = faqTab === 'vivienda' ? '#FDFAF5' : '#6E6A65';\n    const faqTabLocalesBg = faqTab === 'locales' ? '#141316' : 'transparent';\n    const faqTabLocalesColor = faqTab === 'locales' ? '#FDFAF5' : '#6E6A65';\n\n    // Form\n    const ft = formType || 'vivienda';\n    const formViviendaBg = ft === 'vivienda' ? 'rgba(253,250,245,0.1)' : 'transparent';\n    const formViviendaColor = ft === 'vivienda' ? '#FDFAF5' : 'rgba(253,250,245,0.38)';\n    const formViviendaBorder = ft === 'vivienda' ? '1px solid rgba(253,250,245,0.22)' : '1px solid rgba(253,250,245,0.08)';\n    const formLocalesBg = ft === 'locales' ? 'rgba(253,250,245,0.1)' : 'transparent';\n    const formLocalesColor = ft === 'locales' ? '#FDFAF5' : 'rgba(253,250,245,0.38)';\n    const formLocalesBorder = ft === 'locales' ? '1px solid rgba(253,250,245,0.22)' : '1px solid rgba(253,250,245,0.08)';\n\n    return {\n      navBg, navBorderBottom, navBoxShadow, navTextColor, navLogoFilter,\n      activeFaqs,\n      faqTabViviendaBg, faqTabViviendaColor,\n      faqTabLocalesBg, faqTabLocalesColor,\n      toggleFaq: (e) => {\n        const id = e.currentTarget.getAttribute('data-id');\n        this.setState(s => ({ openFaq: s.openFaq === id ? null : id }));\n      },\n      setFaqVivienda: () => this.setState({ faqTab: 'vivienda', openFaq: null }),\n      setFaqLocales: () => this.setState({ faqTab: 'locales', openFaq: null }),\n      formViviendaBg, formViviendaColor, formViviendaBorder,\n      formLocalesBg, formLocalesColor, formLocalesBorder,\n      setFormVivienda: () => this.setState({ formType: 'vivienda' }),\n      setFormLocales: () => this.setState({ formType: 'locales' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
